name: Codex Auto-Trigger

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Review issue number
        required: true
        type: number

permissions:
  issues: write
  contents: write

jobs:
  trigger-codex-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'codex-review')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'codex-review')
    concurrency:
      group: codex-auto-trigger-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Extract metadata
        id: metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "issue_url=https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "issue_title=Manual trigger" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "issue_url=${{ github.event.issue.html_url }}" >> "$GITHUB_OUTPUT"
            printf 'issue_title=%s\n' "${{ github.event.issue.title }}" >> "$GITHUB_OUTPUT"
          fi
          TASK_ID="$(printf '%s\n' "${{ github.event.issue.title }}" | grep -oE 'TASK-[0-9]+' | head -1 || true)"
          echo "task_id=${TASK_ID:-N/A}" >> "$GITHUB_OUTPUT"

      - name: Trigger Codex review
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: codex-review-requested
          client-payload: |
            {
              "issue_number": ${{ steps.metadata.outputs.issue_number }},
              "issue_url": "${{ steps.metadata.outputs.issue_url }}",
              "task_id": "${{ steps.metadata.outputs.task_id }}"
            }

      - name: Post status comment
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = Number('${{ steps.metadata.outputs.issue_number }}');
            const taskId = '${{ steps.metadata.outputs.task_id }}';
            const body = [
              '## 🤖 Codex Auto-Trigger',
              '',
              '**Status**: Review request received',
              '',
              '- Task ID: ' + taskId,
              '- Next lane: `repository_dispatch -> codex-self-hosted.yml`',
              '',
              'Manual relay is not required unless the workflow fails.',
              '',
              '---',
              '_Powered by Auto-Dev System_',
            ].join('\\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
