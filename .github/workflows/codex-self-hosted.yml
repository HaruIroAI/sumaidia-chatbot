name: Codex Review (Runner Fallback)

on:
  repository_dispatch:
    types: [codex-review-requested]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Review issue number
        required: true
        type: number

permissions:
  issues: write
  contents: write
  actions: read

jobs:
  run-codex-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve issue metadata
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "url=https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "round_counter=1" >> "$GITHUB_OUTPUT"
            echo "task_id=manual" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.client_payload.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.client_payload.issue_url }}" >> "$GITHUB_OUTPUT"
            echo "round_counter=${{ github.event.client_payload.round_counter || '1' }}" >> "$GITHUB_OUTPUT"
            echo "task_id=${{ github.event.client_payload.task_id || 'N/A' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Check review secret
        id: secret_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report missing OPENAI_API_KEY
        if: steps.secret_check.outputs.ready != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.issue.outputs.number }}'),
              body: [
                '## ⚠️ Codex Review Blocked',
                '',
                '`OPENAI_API_KEY` is not configured for this repository.',
                'Configure the secret, then re-run `Codex Auto-Trigger` or the review issue.',
                '',
                '---',
                '_Powered by Auto-Dev System_',
              ].join('\\n'),
            });

      - name: Ensure Codex CLI
        if: steps.secret_check.outputs.ready == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v codex >/dev/null 2>&1; then
            npm install -g @openai/codex || npm install -g @openai/codex-cli
          fi
          codex --version

      - name: Run automated review
        id: review
        if: steps.secret_check.outputs.ready == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
          TASK_ID: ${{ steps.issue.outputs.task_id }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x .auto-dev/scripts/codex-start.sh
          bash .auto-dev/scripts/codex-start.sh --review-only

      - name: Evaluate loop disposition
        if: always() && steps.review.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REPO: ${{ github.repository }}
          ROUND_COUNTER: ${{ steps.issue.outputs.round_counter }}
        run: |
          chmod +x .auto-dev/scripts/evaluator-optimizer.sh .auto-dev/scripts/evaluator-claude-fix.sh
          REVIEW_STATE="NEEDS_CHANGES"
          LAST_BODY="$(curl -sS --fail \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments?per_page=100" \
            | jq -r 'last | .body // \"\"' 2>/dev/null || true)"
          if printf '%s\n' "$LAST_BODY" | grep -qi '\bLGTM\b'; then
            REVIEW_STATE="LGTM"
          fi
          bash .auto-dev/scripts/evaluator-optimizer.sh \
            --state "$REVIEW_STATE" \
            --round-counter "${ROUND_COUNTER:-1}" \
            --max-rounds 5 \
            --claude-fix-cmd "bash .auto-dev/scripts/evaluator-claude-fix.sh"

      - name: Post completion notification
        if: always()
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          SECRET_READY: ${{ steps.secret_check.outputs.ready }}
          TASK_ID: ${{ steps.issue.outputs.task_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const secretReady = process.env.SECRET_READY === 'true';
            const status = '${{ job.status }}';
            const taskId = process.env.TASK_ID;
            const workflowUrl = process.env.WORKFLOW_URL;
            const body = !secretReady
              ? [
                  '## ℹ️ Codex Review Waiting For Secrets',
                  '',
                  '- Task ID: ' + taskId,
                  '- Missing secret: `OPENAI_API_KEY`',
                  '',
                  'The review lane stopped safely before running Codex.',
                  '',
                  '---',
                  '_Powered by Auto-Dev System_',
                ].join('\\n')
              : status === 'success'
              ? [
                  '## ✅ Codex Review Completed',
                  '',
                  '- Task ID: ' + taskId,
                  '- Status: Success',
                  '',
                  'Review comment has been posted above.',
                  '',
                  '---',
                  '_Powered by Auto-Dev System_',
                ].join('\\n')
              : [
                  '## ⚠️ Codex Review Status',
                  '',
                  '- Task ID: ' + taskId,
                  '- Status: ' + status,
                  '',
                  'Check the workflow logs: ' + workflowUrl,
                  '',
                  '---',
                  '_Powered by Auto-Dev System_',
                ].join('\\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
